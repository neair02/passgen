<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Редактировать — PassVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="site-header">
  <div class="container">
    <div class="logo">
      <a href="/" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:.5rem;">
        <span class="logo-icon">🔐</span>
        <span class="logo-text">PassVault</span>
      </a>
    </div>
    <p class="logo-sub">Редактирование записи</p>
  </div>
</header>

<main class="container">

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flashes">
        {% for cat, msg in messages %}
          <div class="flash flash--{{ cat }}">{{ msg }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <section class="card" style="max-width:560px; margin:0 auto;">
    <h2 class="section-title">Редактировать «{{ pwd.label }}»</h2>

    <form action="/edit/{{ pwd.id }}" method="POST" class="edit-form">
      <div class="input-group">
        <label for="label">Сайт / сервис *</label>
        <input type="text" name="label" id="label" value="{{ pwd.label }}" required>
      </div>
      <div class="input-group">
        <label for="login">Логин / email</label>
        <input type="text" name="login" id="login" value="{{ pwd.login }}">
      </div>
      <div class="input-group">
        <label for="password">Пароль *</label>
        <div class="pwd-field-wrap">
          <input type="text" name="password" id="password" value="{{ pwd.password }}" required class="mono">
          <button type="button" class="btn-icon" onclick="genNew()">🔄</button>
        </div>
        <span class="hint">Нажмите 🔄 чтобы сгенерировать новый пароль</span>
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn--primary">💾 Сохранить</button>
        <a href="/" class="btn btn--ghost">Отмена</a>
      </div>
    </form>
  </section>

</main>

<script>
  async function genNew() {
    const formData = new FormData();
    formData.append('length', '16');
    formData.append('upper', 'on');
    formData.append('digits', 'on');
    formData.append('special', 'on');
    const res = await fetch('/generate', { method: 'POST', body: formData });
    const json = await res.json();
    document.getElementById('password').value = json.password;
  }
</script>
</body>
</html>
